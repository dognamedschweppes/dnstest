<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Test Adventure</title>

<style>

body{
background:#535353;
font-family: Verdana, Arial;
margin:0;
}

.page{
width:650px;
margin:auto;
background:white;
padding:20px;
margin-top:20px;
}

.title{
font-weight:bold;
margin-bottom:10px;
}

.panel{
text-align:center;
margin:20px 0;
}

.panel img{
max-width:100%;
}

.text{
font-size:14px;
line-height:1.4;
margin-bottom:20px;
}

.next{
font-weight:bold;
font-size:16px;
}

.next a{
text-decoration:none;
color:#0000ff;
}

.next a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="page">

<div class="title" id="title"></div>

<div class="panel">
<img id="panel">
</div>

<div class="text" id="text"></div>

<div class="next">
<a id="next">==></a>
</div>

</div>

<script src="/dnstest/story.js"></script>

</body>
</html>
